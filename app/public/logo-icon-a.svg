<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Concept A: Four rounded squares with cross-shaped negative space (gap) between them -->
  <!-- The cross emerges from the whitespace — subtle, structural -->
  <rect x="2" y="2" width="19" height="19" rx="4" fill="currentColor"/>
  <rect x="27" y="2" width="19" height="19" rx="4" fill="currentColor"/>
  <rect x="2" y="27" width="19" height="19" rx="4" fill="currentColor"/>
  <rect x="27" y="27" width="19" height="19" rx="4" fill="currentColor"/>
</svg>
