<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8efe0"/>
      <stop offset="0.48" stop-color="#ecd8bb"/>
      <stop offset="1" stop-color="#d7b894"/>
    </linearGradient>
    <linearGradient id="ink" x1="100" y1="70" x2="1000" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#122033"/>
      <stop offset="1" stop-color="#422238"/>
    </linearGradient>
    <radialGradient id="blueWash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(245 150) rotate(42) scale(390 210)">
      <stop stop-color="#79b8ff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#79b8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="roseWash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 115) rotate(126) scale(430 250)">
      <stop stop-color="#d988b7" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#d988b7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberWash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(875 540) rotate(12) scale(500 220)">
      <stop stop-color="#e4a843" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#e4a843" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#3b281d" flood-opacity="0.2"/>
    </filter>
    <filter id="paperTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in2="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#blueWash)"/>
  <rect width="1200" height="630" fill="url(#roseWash)"/>
  <rect width="1200" height="630" fill="url(#amberWash)"/>
  <rect width="1200" height="630" fill="#ffffff" opacity="0.18" filter="url(#paperTexture)"/>

  <path d="M44 94C187 31 318 64 419 127C535 198 647 201 781 149C916 96 1031 73 1168 126" stroke="#f8f0df" stroke-width="26" stroke-linecap="round" opacity="0.42"/>
  <path d="M36 522C187 454 343 461 491 517C662 581 807 568 964 500C1044 465 1111 453 1183 463" stroke="#8fa9c7" stroke-width="18" stroke-linecap="round" opacity="0.18"/>

  <g transform="translate(690 92) rotate(8)" filter="url(#softShadow)">
    <rect x="0" y="0" width="340" height="438" rx="22" fill="#fdf7eb"/>
    <rect x="26" y="30" width="288" height="377" rx="10" fill="#fffaf1" stroke="#dfc8aa" stroke-width="2"/>
    <path d="M60 96H279M60 142H279M60 188H279M60 234H279M60 280H245" stroke="#ccb698" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
    <path d="M76 350C110 317 148 322 178 350C204 374 239 376 271 342" stroke="#537bbd" stroke-width="6" stroke-linecap="round" opacity="0.76"/>
    <rect x="38" y="32" width="24" height="374" fill="#2e65c7" opacity="0.16"/>
  </g>

  <g transform="translate(780 198) rotate(-11)" filter="url(#softShadow)">
    <rect x="0" y="0" width="310" height="356" rx="20" fill="#283246"/>
    <rect x="24" y="28" width="262" height="299" rx="12" fill="#34405a" stroke="#151d2d" stroke-width="2"/>
    <path d="M68 96H245M68 139H245M68 182H225M68 225H238" stroke="#edf4ff" stroke-width="4" stroke-linecap="round" opacity="0.36"/>
    <path d="M45 54L260 301" stroke="#5aa0ff" stroke-width="2" opacity="0.18"/>
  </g>

  <g transform="translate(606 390) rotate(-7)" filter="url(#softShadow)">
    <rect width="250" height="110" rx="18" fill="#f7dfb8"/>
    <rect x="22" y="26" width="206" height="58" rx="6" fill="#fff3d8" stroke="#cda46d" stroke-width="2"/>
    <path d="M54 54H196" stroke="#b88345" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
  </g>

  <g transform="translate(98 86)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="36" height="36" rx="7" fill="#2563eb"/>
      <rect x="48" y="0" width="36" height="36" rx="7" fill="#a855f7"/>
      <rect x="0" y="48" width="36" height="36" rx="7" fill="#a855f7"/>
      <rect x="48" y="48" width="36" height="36" rx="7" fill="#2563eb"/>
    </g>
    <text x="0" y="162" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="66" font-weight="850" fill="url(#ink)" letter-spacing="-3">TheCrossBoard</text>
    <text x="4" y="226" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="37" font-weight="750" fill="#25334a" letter-spacing="-0.5">Show and grow your craft.</text>
    <text x="4" y="276" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="37" font-weight="750" fill="#25334a" letter-spacing="-0.5">Collaborate &amp; find work.</text>
    <text x="6" y="342" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="550" fill="#5b4d43">Portfolios, jobs, events, interviews, podcasts,</text>
    <text x="6" y="378" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="550" fill="#5b4d43">trainings, and creative community.</text>
  </g>
</svg>
